finalAnswers } = this.state;\n    const steps = diagMode==='initial' ? this.STEPS_I : this.STEPS_F;\n    const step = steps[diagStep];\n    if (step.type==='choice') { const ans = diagMode==='initial'?diagAnswers:finalAnswers; if (!ans[step.key]) return; }\n    this.setState({ diagStep:diagStep+1, voiceTranscript:'' });\n  }\n  onSubmitDiag = async () => {\n    const { diagMode, diagAnswers, finalAnswers, voiceTranscript } = this.state;\n    const answers = diagMode==='initial' ? {...diagAnswers,voice6:voiceTranscript} : {...finalAnswers,voice6:voiceTranscript};\n    const sc = diagMode==='initial' ? this.INITIAL_SC : this.FINAL_SC;\n    this.setState({ screen: diagMode==='initial'?'ai-loading':'final-loading' });\n    const profile = await this._callAI(answers, sc);\n    if (diagMode==='initial') { this.setState({ initialProfile:profile, diagAnswers:answers, screen:'results' }, ()=>this._save()); }\n    else { this.setState({ finalProfile:profile, finalAnswers:answers, screen:'final-results' }, ()=>this._save()); }\n  }\n  onStartCourse = () => this.setState({ screen:'course-map' })\n  onBackToCourse = () => this.setState({ screen:'course-map' })\n  onTabTheory = () => this.setState({ lessonTab:'theory' })\n  onTabPractice = () => this.setState({ lessonTab:'practice' })\n  onTabReflection = () => this.setState({ lessonTab:'reflection' })\n  onFinalChallenge = () => this.setState({ screen:'diagnostic', diagMode:'final', diagStep:0, voiceTranscript:'' })\n  onOpenLesson = (id) => {\n    const { completedLessons } = this.state;\n    const ok = id===1 || completedLessons.includes(id-1) || completedLessons.includes(id);\n    if (!ok) return;\n    this.setState({ screen:'lesson', currentLesson:id, lessonTab:'theory', practiceAnswers:{}, practiceSubmitted:false });\n  }\n  onOpenPrint = () => this.setState({ prevScreen:this.state.screen, screen:'print' })\n  onBackFromPrint = () => this.setState({ screen:this.state.prevScreen })\n  onPrint = () => window.print()\n  onCompleteLesson = () => {\n    const { currentLesson, completedLessons, reflectionAnswers } = this.state;\n    const lesson = this.LESSONS.find(l=>l.id===currentLesson);\n    const allOk = lesson.reflections.every((rq,idx)=>{\n      const key = `${currentLesson}_${idx}`;\n      const ans = reflectionAnswers[key];\n      if (rq.type==='text') return ans && ans.trim().length>5;\n      if (rq.type==='slider') return true;\n      if (rq.type==='choice') return !!ans;\n      return true;\n    });\n    if (!allOk) return;\n    const updated = completedLessons.includes(currentLesson) ? completedLessons : [...completedLessons, currentLesson];\n    this.setState({ completedLessons:updated, screen:'course-map' }, ()=>this._save());\n  }\n  onRestart = () => {\n    try { localStorage.removeItem('kp_med_v2'); } catch(e) {}\n    this.setState({ screen:'welcome', diagStep:0, diagMode:'initial', diagAnswers:{slider1:5,slider2:5,slider3:5,choice4:null,choice5:null,voice6:''}, finalAnswers:{slider1:5,slider2:5,slider3:5,choice4:null,choice5:null,voice6:''}, initialProfile:null, finalProfile:null, completedLessons:[], reflectionAnswers:{} });\n  }\n\n  // ── INPUTS ────────────────────────────────────────────────────────────────\n  onSliderInput = (e) => {\n    const { diagStep, diagMode, diagAnswers, finalAnswers } = this.state;\n    const steps = diagMode==='initial'?this.STEPS_I:this.STEPS_F;\n    const key = steps[diagStep].key;\n    const val = parseInt(e.target.value);\n    if (diagMode==='initial') this.setState({ diagAnswers:{...diagAnswers,[key]:val} });\n    else this.setState({ finalAnswers:{...finalAnswers,[key]:val} });\n  }\n  handleChoice = (optId) => {\n    const { diagStep, diagMode, diagAnswers, finalAnswers } = this.state;\n    const steps = diagMode==='initial'?this.STEPS_I:this.STEPS_F;\n    const key = steps[diagStep].key;\n    if (diagMode==='initial') this.setState({ diagAnswers:{...diagAnswers,[key]:optId} });\n    else this.setState({ finalAnswers:{...finalAnswers,[key]:optId} });\n  }\n  onTranscriptChange = (e) => this.setState({ voiceTranscript:e.target.value })\n  onToggleRecord = () => { if (this.state.isRecording) this._stopRec(); else this._startRec(); }\n  _startRec = () => {\n    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;\n    if (!SR) return;\n    const rec = new SR(); rec.lang='uk-UA'; rec.continuous=true; rec.interimResults=true;\n    rec.onresult = (e) => this.setState({ voiceTranscript:Array.from(e.results).map(r=>r[0].transcript).join('') });\n    rec.onerror = () => this.setState({ isRecording:false });\n    rec.onend = () => this.setState({ isRecording:false });\n    rec.start();\n    this.setState({ isRecording:true, recognition:rec });\n  }\n  _stopRec = () => { if (this.state.recognition) this.state.recognition.stop(); this.setState({ isRecording:false }); }\n\n  setReflectionAnswer = (lessonId, qIdx, value) => {\n    const key = `${lessonId}_${qIdx}`;\n    this.setState(s => ({ reflectionAnswers:{...s.reflectionAnswers,[key]:value} }), ()=>this._save());\n  }\n\n  // ── PRACTICE ──────────────────────────────────────────────────────────────\n  handleClassify = (id, val) => { if (this.state.practiceSubmitted) return; const pa={...this.state.practiceAnswers}; pa.classify={...(pa.classify||{}),[id]:val}; this.setState({practiceAnswers:pa}); }\n  handlePracticeChoice = (id) => { if (this.state.practiceSubmitted) return; this.setState({practiceAnswers:{choice:id}}); }\n  handleMatchToggle = (id) => { if (this.state.practiceSubmitted) return; const pa={...this.state.practiceAnswers}; const sel=new Set(pa.match||[]); if(sel.has(id)) sel.delete(id); else sel.add(id); pa.match=Array.from(sel); this.setState({practiceAnswers:pa}); }\n  handleOrderClick = (id) => { if (this.state.practiceSubmitted) return; const pa={...this.state.practiceAnswers}; const order=[...(pa.order||[])]; const idx=order.indexOf(id); if(idx>=0) order.splice(idx,1); else if(order.length<5) order.push(id); pa.order=order; this.setState({practiceAnswers:pa}); }\n  onSubmitPractice = () => this.setState({practiceSubmitted:true})\n  _practiceScore() {\n    const { currentLesson, practiceAnswers } = this.state;\n    const lesson = this.LESSONS.find(l=>l.id===currentLesson); if(!lesson) return 0;\n    const p = lesson.practice;\n    if(p.type==='classify') { const total=p.items.length; let c=0; p.items.forEach(i=>{ if(practiceAnswers.classify?.[i.id]===i.answer) c++; }); return c/total; }\n    if(p.type==='choice') { const co=p.options.find(o=>o.correct); return practiceAnswers.choice===co?.id?1:0; }\n    if(p.type==='match') { const cIds=p.options.filter(o=>o.correct).map(o=>o.id); const sel=practiceAnswers.match||[]; const hits=sel.filter(id=>cIds.includes(id)).length; const misses=sel.filter(id=>!cIds.includes(id)).length; return Math.max(0,(hits-misses)/cIds.length); }\n    if(p.type==='order') { const order=practiceAnswers.order||[]; let c=0; order.forEach((id,i)=>{ const item=p.items.find(it=>it.id===id); if(item&&item.order===i+1) c++; }); return c/p.items.length; }\n    return 0;\n  }\n\n  // ── AI ────────────────────────────────────────────────────────────────────\n  async _callAI(answers, sc) {\n    const cmap={a:'Варіант А',b:'Варіант Б',c:'Варіант В'};\n    const prompt=`Ти — провідний тренер з медіації. Проаналізуй відповіді учасника.\n\nСЦЕНАРІЙ: ${sc.situation}\nВІДПОВІДІ:\n1. Нейтральність (слайдер 1-10, 5=нейтраль): ${answers.slider1}\n2. Стиль слухання (1=пасивне, 10=структуроване): ${answers.slider2}\n3. Підхід (1=компроміс, 10=пошук інтересів): ${answers.slider3}\n4. Відкриття сесії: ${cmap[answers.choice4]||'не вибрано'}\n5. Реакція на звинувачення: ${cmap[answers.choice5]||'не вибрано'}\n6. Питання для виявлення інтересів: \"${answers.voice6||'не надано'}\"\n\nОціни 5 компетенцій (0-100) та склади профіль. Відповідай ТІЛЬКИ JSON:\n{\"scores\":{\"listening\":0,\"neutrality\":0,\"questions\":0,\"interests\":0,\"solutions\":0},\"profileType\":\"назва типу (2-4 слова укр)\",\"profileDesc\":\"1 речення про тип\",\"analysis\":\"2-3 речення персонального аналізу з посиланням на конкретні відповіді\",\"recommendations\":[\"реком 1\",\"реком 2\",\"реком 3\"]}`;\n    try {\n      const resp = await window.claude.complete({ model:'claude-haiku-4-5', messages:[{role:'user',content:prompt}], max_tokens:800 });\n      const m=resp.match(/\\{[\\s\\S]*\\}/); if(m) return JSON.parse(m[0]);\n    } catch(e) {}\n    return {scores:{listening:60,neutrality:65,questions:55,interests:50,solutions:45},profileType:'Початківець-медіатор',profileDesc:'Є базова інтуїція, але бракує системності',analysis:'Ви показали бажання допомогти та базову емпатію. Зверніть увагу на нейтральність та виявлення інтересів.',recommendations:['Практикуйте активне слухання щодня','Вивчіть техніку відкритих питань','Зосередьтесь на пошуку інтересів за позиціями']};\n  }\n\n  // ── RADAR ─────────────────────────────────────────────────────────────────\n  _radar(scores,size=190,color='#FFDC1A') {\n    if(!scores) return null;\n    const E=React.createElement, cx=size/2, cy=size/2, r=size*0.36;\n    const labels=['Слухання','Нейтр-ть','Питання','Інтереси','Рішення'];\n    const keys=['listening','neutrality','questions','interests','solutions'];\n    const n=5, step=(2*Math.PI)/n;\n    const pt=(i,d)=>{ const a=i*step-Math.PI/2; return [cx+d*Math.cos(a),cy+d*Math.sin(a)]; };\n    const grids=[0.25,0.5,0.75,1].map((f,i)=>E('circle',{key:'g'+i,cx,cy,r:r*f,fill:'none',stroke:'rgba(255,255,255,0.1)',strokeWidth:1}));\n    const lines=labels.map((_,i)=>{ const [x,y]=pt(i,r); return E('line',{key:'l'+i,x1:cx,y1:cy,x2:x,y2:y,stroke:'rgba(255,255,255,0.1)',strokeWidth:1}); });\n    const vals=keys.map(k=>(scores[k]||50)/100);\n    const dpts=vals.map((v,i)=>pt(i,r*v));\n    const poly=E('polygon',{key:'p',points:dpts.map(([x,y])=>`${x},${y}`).join(' '),fill:color+'25',stroke:color,strokeWidth:2.5});\n    const dots=dpts.map(([x,y],i)=>E('circle',{key:'d'+i,cx:x,cy:y,r:4,fill:color}));\n    const lbls=labels.map((l,i)=>{ const [x,y]=pt(i,r*1.35); return E('text',{key:'t'+i,x,y,textAnchor:'middle',dominantBaseline:'middle',fontSize:9,fill:'rgba(255,255,255,0.65)',fontFamily:'Archivo,sans-serif'},l); });\n    return E('svg',{width:size+60,height:size+60,viewBox:`-30 -30 ${size+60} ${size+60}`,style:{overflow:'visible'}},...grids,...lines,poly,...dots,...lbls);\n  }\n\n  _radarDark(scores,size=190) {\n    if(!scores) return null;\n    const E=React.createElement, cx=size/2, cy=size/2, r=size*0.36;\n    const labels=['Слухання','Нейтр-ть','Питання','Інтереси','Рішення'];\n    const keys=['listening','neutrality','questions','interests','solutions'];\n    const n=5, step=(2*Math.PI)/n;\n    const pt=(i,d)=>{ const a=i*step-Math.PI/2; return [cx+d*Math.cos(a),cy+d*Math.sin(a)]; };\n    const grids=[0.25,0.5,0.75,1].map((f,i)=>E('circle',{key:'g'+i,cx,cy,r:r*f,fill:'none',stroke:'#E8E5DF',strokeWidth:1}));\n    const lines=labels.map((_,i)=>{ const [x,y]=pt(i,r); return E('line',{key:'l'+i,x1:cx,y1:cy,x2:x,y2:y,stroke:'#E8E5DF',strokeWidth:1}); });\n    const vals=keys.map(k=>(scores[k]||50)/100);\n    const dpts=vals.map((v,i)=>pt(i,r*v));\n    const poly=E('polygon',{key:'p',points:dpts.map(([x,y])=>`${x},${y}`).join(' '),fill:'#FFDC1A33',stroke:'#191B1C',strokeWidth:2.5});\n    const dots=dpts.map(([x,y],i)=>E('circle',{key:'d'+i,cx:x,cy:y,r:4,fill:'#191B1C'}));\n    const lbls=labels.map((l,i)=>{ const [x,y]=pt(i,r*1.38); return E('text',{key:'t'+i,x,y,textAnchor:'middle',dominantBaseline:'middle',fontSize:9,fill:'#5A5E63',fontFamily:'Archivo,sans-serif'},l); });\n    return E('svg',{width:size+80,height:size+60,viewBox:`-40 -30 ${size+80} ${size+60}`,style:{overflow:'visible'}},...grids,...lines,poly,...dots,...lbls);\n  }\n\n  // ── INFOGRAPHICS ──────────────────────────────────────────────────────────\n  _infographic(id) {\n    const E=React.createElement, B='#191B1C', Y='#FFDC1A', G='#5A5E63', L='#F5F3EE', W='#fff', R='#E53E3E', Gr='#1F
