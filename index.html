  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-direction:column;position:relative;overflow:hidden\">\n  <img src=\"1dd3cb5d-383f-4851-8cc0-a8031f5a5211\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.07;pointer-events:none\" alt=\"\">\n  <img src=\"3574edbd-95e4-45f3-a931-a996b03bb0e3\" style=\"position:absolute;top:-30px;right:-50px;width:400px;opacity:0.18;pointer-events:none\" alt=\"\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:24px 40px;position:relative;z-index:1\">\n    <img src=\"d951551d-d8d8-4dbc-b9d4-cfa90659da7b\" style=\"height:26px\" alt=\"KnowPack\">\n    <div style=\"font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase\">Медіація · Курс<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:40px;position:relative;z-index:1\">\n    <div style=\"max-width:660px;text-align:center\">\n      <div style=\"display:inline-block;background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:10px;letter-spacing:0.13em;padding:5px 14px;margin-bottom:32px;text-transform:uppercase\">AI · Курс · Медіація<\u002Fdiv>\n      <h1 style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(40px,7vw,72px);color:#fff;line-height:1.05;margin:0 0 24px;letter-spacing:-0.02em\">Чи вмієш ти<br><span style=\"display:inline-block;position:relative\"><span style=\"position:relative;z-index:1;color:#191B1C;padding:0 6px\">вирішувати<\u002Fspan><span style=\"position:absolute;top:4px;left:-4px;right:-4px;bottom:0;background:#FFDC1A;transform:rotate(-2deg);z-index:0\"><\u002Fspan><\u002Fspan><br>конфлікти?<\u002Fh1>\n      <p style=\"font-size:17px;color:rgba(255,255,255,0.55);line-height:1.65;margin:0 0 44px;max-width:480px;margin-left:auto;margin-right:auto\">Пройди AI-діагностику, 5 уроків — і дізнайся, наскільки ти готовий стати ефективним медіатором<\u002Fp>\n      <div style=\"display:flex;justify-content:center;margin-bottom:48px;border:1px solid rgba(255,255,255,0.1)\">\n        <div style=\"padding:20px 36px;text-align:center;border-right:1px solid rgba(255,255,255,0.1)\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:30px;color:#FFDC1A;line-height:1\">2<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,0.38);margin-top:4px\">Челенджі<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:20px 36px;text-align:center;border-right:1px solid rgba(255,255,255,0.1)\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:30px;color:#FFDC1A;line-height:1\">5<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,0.38);margin-top:4px\">Уроків<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:20px 36px;text-align:center\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:30px;color:#FFDC1A;line-height:1\">AI<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,0.38);margin-top:4px\">Профіль<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ onStart }}\" style=\"background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:17px;padding:18px 52px;box-shadow:6px 6px 0 0 rgba(255,220,26,0.25)\">Почати діагностику →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ DIAGNOSTIC ══ -->\n<sc-if value=\"{{ isDiag }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:#FAFAF8\">\n  <div style=\"background:#191B1C;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0\">\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <img src=\"d951551d-d8d8-4dbc-b9d4-cfa90659da7b\" style=\"height:20px;filter:brightness(0) invert(1)\" alt=\"KP\">\n      <div style=\"width:1px;height:16px;background:rgba(255,255,255,0.15)\"><\u002Fdiv>\n      <span style=\"font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em\">{{ diagModeLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-size:11px;color:rgba(255,255,255,0.3)\">{{ diagStepLabel }}<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"height:3px;background:#2D2F31;flex-shrink:0\"><div style=\"height:100%;background:#FFDC1A;width:{{ diagProgressPct }};transition:width 0.4s ease\"><\u002Fdiv><\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;overflow-y:auto\">\n    <div style=\"width:100%;max-width:640px\">\n\n      <!-- Scenario -->\n      <sc-if value=\"{{ isStepScenario }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp 0.4s ease\">\n        <div style=\"display:inline-block;background:#191B1C;color:#FFDC1A;font-family:'Archivo Black',sans-serif;font-size:10px;letter-spacing:0.1em;padding:5px 12px;margin-bottom:22px;text-transform:uppercase\">{{ diagModeLabel }}<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:32px;color:#191B1C;margin:0 0 6px;letter-spacing:-0.02em;line-height:1.1\">{{ scTitle }}<\u002Fh2>\n        <p style=\"font-size:14px;color:#5A5E63;margin:0 0 28px;line-height:1.55\">{{ scContext }}<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px\">\n          <div style=\"background:#fff;border:2px solid #191B1C;padding:18px;box-shadow:4px 4px 0 0 #FFDC1A\"><div style=\"font-size:24px;margin-bottom:8px\">{{ scChar1Avatar }}<\u002Fdiv><div style=\"font-family:'Archivo Black',sans-serif;font-size:14px;color:#191B1C\">{{ scChar1Name }}<\u002Fdiv><div style=\"font-size:12px;color:#5A5E63;margin-top:2px\">{{ scChar1Role }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:2px solid #191B1C;padding:18px;box-shadow:4px 4px 0 0 #FFDC1A\"><div style=\"font-size:24px;margin-bottom:8px\">{{ scChar2Avatar }}<\u002Fdiv><div style=\"font-family:'Archivo Black',sans-serif;font-size:14px;color:#191B1C\">{{ scChar2Name }}<\u002Fdiv><div style=\"font-size:12px;color:#5A5E63;margin-top:2px\">{{ scChar2Role }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFBEB;border-left:4px solid #FFDC1A;padding:16px 20px;margin-bottom:12px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#5A5E63;margin-bottom:6px;font-weight:700\">Ситуація<\u002Fdiv><p style=\"font-size:15px;color:#191B1C;line-height:1.65;margin:0\">{{ scSituation }}<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F5F3EE;padding:12px 18px;margin-bottom:36px\"><p style=\"font-size:13px;color:#5A5E63;margin:0;line-height:1.6\"><strong style=\"color:#191B1C\">Ставки:<\u002Fstrong> {{ scStakes }}<\u002Fp><\u002Fdiv>\n        <button onclick=\"{{ onNextStep }}\" style=\"width:100%;background:#191B1C;color:#fff;font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:4px 4px 0 0 #FFDC1A\">Я готовий відповідати →<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Slider -->\n      <sc-if value=\"{{ isStepSlider }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp 0.4s ease\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:12px;font-weight:600\">Питання {{ stNum }} / 6<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:26px;color:#191B1C;margin:0 0 40px;line-height:1.2;letter-spacing:-0.01em\">{{ stQuestion }}<\u002Fh2>\n        <div style=\"background:#fff;border:2px solid #191B1C;padding:36px 28px;box-shadow:6px 6px 0 0 #FFDC1A;margin-bottom:36px\">\n          <div style=\"display:flex;justify-content:space-between;margin-bottom:4px\">\n            <div style=\"max-width:44%\"><div style=\"font-size:13px;font-weight:700;color:#191B1C;line-height:1.3\">{{ stLeftLabel }}<\u002Fdiv><div style=\"font-size:11px;color:#5A5E63;margin-top:2px\">{{ stLeftSub }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"max-width:44%;text-align:right\"><div style=\"font-size:13px;font-weight:700;color:#191B1C;line-height:1.3\">{{ stRightLabel }}<\u002Fdiv><div style=\"font-size:11px;color:#5A5E63;margin-top:2px\">{{ stRightSub }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 0 8px\"><input type=\"range\" min=\"1\" max=\"10\" value=\"{{ sliderValue }}\" oninput=\"{{ onSliderInput }}\"><\u002Fdiv>\n          <div style=\"text-align:center;margin-top:8px\"><span style=\"display:inline-block;background:#191B1C;color:#FFDC1A;font-family:'Archivo Black',sans-serif;font-size:22px;padding:6px 18px;min-width:54px;text-align:center\">{{ sliderValue }}<\u002Fspan><div style=\"font-size:11px;color:#5A5E63;margin-top:6px\">{{ sliderPositionLabel }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onNextStep }}\" style=\"width:100%;background:#191B1C;color:#fff;font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:4px 4px 0 0 #FFDC1A\">Далі →<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Choice -->\n      <sc-if value=\"{{ isStepChoice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp 0.4s ease\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:12px;font-weight:600\">Питання {{ stNum }} / 6<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:24px;color:#191B1C;margin:0 0 28px;line-height:1.3;letter-spacing:-0.01em\">{{ stQuestion }}<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:36px\">\n          <sc-for list=\"{{ choiceOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ opt.onSelect }}\" style=\"text-align:left;background:{{ opt.bg }};border:2px solid {{ opt.border }};padding:16px 18px;font-size:15px;color:{{ opt.textColor }};line-height:1.55;box-shadow:{{ opt.shadow }};transition:all 0.12s\"><span style=\"font-family:'Archivo Black',sans-serif;color:{{ opt.labelColor }};margin-right:8px\">{{ opt.label }}<\u002Fspan>{{ opt.text }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ onNextStep }}\" style=\"width:100%;background:{{ nextBg }};color:{{ nextColor }};font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:{{ nextShadow }};cursor:{{ nextCursor }};transition:all 0.2s\">Далі →<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Voice -->\n      <sc-if value=\"{{ isStepVoice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp 0.4s ease\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:12px;font-weight:600\">Питання 6 / 6<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:24px;color:#191B1C;margin:0 0 10px;line-height:1.25;letter-spacing:-0.01em\">{{ stQuestion }}<\u002Fh2>\n        <p style=\"font-size:14px;color:#5A5E63;margin:0 0 28px;line-height:1.55\">{{ stVoiceHint }}<\u002Fp>\n        <div style=\"background:#fff;border:2px solid #191B1C;padding:28px;box-shadow:6px 6px 0 0 #FFDC1A;margin-bottom:28px\">\n          <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:20px\">\n            <button onclick=\"{{ onToggleRecord }}\" style=\"width:58px;height:58px;border-radius:50%;background:{{ micBg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;box-shadow:{{ micShadow }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ micIconColor }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z\"><\u002Fpath><path d=\"M19 10v2a7 7 0 0 1-14 0v-2\"><\u002Fpath><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"23\"><\u002Fline><line x1=\"8\" y1=\"23\" x2=\"16\" y2=\"23\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n            <div><div style=\"font-size:13px;font-weight:700;color:#191B1C\">{{ micStatusText }}<\u002Fdiv><div style=\"font-size:12px;color:#5A5E63;margin-top:2px\">{{ micHint }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <textarea value=\"{{ voiceTranscript }}\" oninput=\"{{ onTranscriptChange }}\" placeholder=\"Ваша відповідь з'явиться тут... або введіть текст\" style=\"width:100%;min-height:100px;border:1px solid #E8E5DF;padding:12px;font-size:15px;color:#191B1C;line-height:1.6;background:#FAFAF8\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button onclick=\"{{ onSubmitDiag }}\" style=\"width:100%;background:{{ submitBg }};color:{{ submitColor }};font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:{{ submitShadow }};cursor:{{ submitCursor }};transition:all 0.2s\">{{ submitLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ AI LOADING ══ -->\n<sc-if value=\"{{ isAiLoading }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#191B1C;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden\">\n  <img src=\"1dd3cb5d-383f-4851-8cc0-a8031f5a5211\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.07;pointer-events:none\" alt=\"\">\n  <div style=\"text-align:center;position:relative;z-index:1\">\n    <div style=\"width:72px;height:72px;border:3px solid rgba(255,220,26,0.25);border-top-color:#FFDC1A;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 32px\"><\u002Fdiv>\n    <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:26px;color:#fff;margin:0 0 12px;letter-spacing:-0.01em\">AI аналізує ваші відповіді...<\u002Fh2>\n    <p style=\"font-size:15px;color:rgba(255,255,255,0.4);max-width:340px;line-height:1.6;margin:0 auto\">Оцінюємо 5 компетенцій медіатора та формуємо ваш профіль<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ AI RESULTS ══ -->\n<sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#FAF8F2;display:flex;flex-direction:column\">\n  <div style=\"background:#191B1C;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0\">\n    <img src=\"d951551d-d8d8-4dbc-b9d4-cfa90659da7b\" style=\"height:20px;filter:brightness(0) invert(1)\" alt=\"KP\">\n    <span style=\"font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.08em;text-transform:uppercase\">Результати діагностики<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px\">\n    <div style=\"width:100%;max-width:980px\">\n      <div style=\"display:grid;grid-template-columns:1fr 1.2fr;gap:28px;align-items:start\">\n        <div style=\"background:#191B1C;padding:32px;box-shadow:8px 8px 0 0 #FFDC1A\">\n          <div style=\"display:inline-block;background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:10px;letter-spacing:0.1em;padding:4px 10px;margin-bottom:20px;text-transform:uppercase\">Ваш профіль<\u002Fdiv>\n          <div style=\"display:flex;justify-content:center;margin-bottom:16px\">{{ radarEl }}<\u002Fdiv>\n          <div style=\"text-align:center;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1)\">\n            <div style=\"font-family:'Archivo Black',sans-serif;font-size:20px;color:#FFDC1A;margin-bottom:6px\">{{ profileType }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:rgba(255,255,255,0.5);line-height:1.55\">{{ profileDesc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#fff;border:2px solid #191B1C;padding:24px;margin-bottom:18px;box-shadow:4px 4px 0 0 #191B1C\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:10px\">Персональний аналіз<\u002Fdiv><p style=\"font-size:15px;color:#191B1C;line-height:1.7;margin:0\">{{ profileAnalysis }}<\u002Fp><\u002Fdiv>\n          <div style=\"background:#fff;border:2px solid #191B1C;padding:22px;margin-bottom:18px\">\n            <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:14px\">Компетенції медіатора<\u002Fdiv>\n            <sc-for list=\"{{ competencyBars }}\" as=\"bar\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:12px\"><div style=\"display:flex;justify-content:space-between;margin-bottom:4px\"><span style=\"font-size:13px;font-weight:600;color:#191B1C\">{{ bar.label }}<\u002Fspan><span style=\"font-size:12px;font-family:'JetBrains Mono',monospace;color:#5A5E63\">{{ bar.value }}%<\u002Fspan><\u002Fdiv><div style=\"height:6px;background:#F0EDE8\"><div style=\"height:100%;background:{{ bar.color }};width:{{ bar.width }};transition:width 0.9s ease\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#FFFBEB;border:2px solid #FFDC1A;padding:22px;margin-bottom:22px\">\n            <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:12px\">Рекомендації<\u002Fdiv>\n            <sc-for list=\"{{ recommendations }}\" as=\"rec\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:10px;margin-bottom:10px\"><div style=\"width:20px;height:20px;background:#191B1C;color:#FFDC1A;font-family:'Archivo Black',sans-serif;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0\">{{ rec.num }}<\u002Fdiv><p style=\"font-size:14px;color:#191B1C;line-height:1.6;margin:0\">{{ rec.text }}<\u002Fp><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ onStartCourse }}\" style=\"width:100%;background:#191B1C;color:#fff;font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:4px 4px 0 0 #FFDC1A\">Розпочати курс →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ COURSE MAP ══ -->\n<sc-if value=\"{{ isCourseMap }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#FAFAF8;display:flex;flex-direction:column\">\n  <div style=\"background:#191B1C;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0\">\n    <img src=\"d951551d-d8d8-4dbc-b9d4-cfa90659da7b\" style=\"height:20px;filter:brightness(0) invert(1)\" alt=\"KP\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <span style=\"font-size:12px;color:rgba(255,255,255,0.4)\">{{ profileTypeBadge }}<\u002Fspan>\n      <button onclick=\"{{ onOpenPrint }}\" style=\"background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:12px;padding:7px 14px;display:{{ printBtnVisible }};border:1px solid rgba(255,255,255,0.15)\">Мій звіт<\u002Fbutton>\n      <button onclick=\"{{ onFinalChallenge }}\" style=\"background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:12px;padding:8px 16px;display:{{ finalChallengeVisible }}\">Фінальний челендж →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:48px 32px;max-width:1020px;margin:0 auto;width:100%\">\n    <div style=\"margin-bottom:36px\"><div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:8px;font-weight:600\">Програма курсу<\u002Fdiv><h2 style=\"font-family:'Archivo Black',sans-serif;font-size:32px;color:#191B1C;margin:0;letter-spacing:-0.02em\">5 уроків з медіації<\u002Fh2><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px\">\n      <sc-for list=\"{{ lessonCards }}\" as=\"card\" hint-placeholder-count=\"5\">\n        <div onclick=\"{{ card.onClick }}\" style=\"background:{{ card.bg }};border:2px solid {{ card.border }};padding:24px;box-shadow:{{ card.shadow }};cursor:{{ card.cursor }};transition:all 0.15s;opacity:{{ card.opacity }}\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px\"><div style=\"background:{{ card.numBg }};color:{{ card.numColor }};font-family:'Archivo Black',sans-serif;font-size:12px;padding:4px 10px\">Урок {{ card.num }}<\u002Fdiv><div style=\"font-size:12px;color:{{ card.statusColor }};font-weight:600\">{{ card.status }}<\u002Fdiv><\u002Fdiv>\n          <h3 style=\"font-family:'Archivo Black',sans-serif;font-size:18px;color:{{ card.titleColor }};margin:0 0 4px;letter-spacing:-0.01em;line-height:1.2\">{{ card.title }}<\u002Fh3>\n          <p style=\"font-size:13px;color:{{ card.subColor }};margin:0 0 14px\">{{ card.subtitle }}<\u002Fp>\n          <div style=\"font-size:12px;color:{{ card.durationColor }}\">{{ card.duration }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ LESSON ══ -->\n<sc-if value=\"{{ isLesson }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:#FAFAF8\">\n  <div style=\"background:#191B1C;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0\">\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <button onclick=\"{{ onBackToCourse }}\" style=\"background:none;color:rgba(255,255,255,0.45);font-size:13px;padding:0\">← Назад<\u002Fbutton>\n      <div style=\"width:1px;height:16px;background:rgba(255,255,255,0.15)\"><\u002Fdiv>\n      <span style=\"font-size:13px;color:#fff;font-weight:600\">{{ lessonLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:2px\">\n      <button onclick=\"{{ onTabTheory }}\" style=\"padding:7px 16px;font-size:12px;font-weight:700;background:{{ tabTheoryBg }};color:{{ tabTheoryColor }}\">Теорія<\u002Fbutton>\n      <button onclick=\"{{ onTabPractice }}\" style=\"padding:7px 16px;font-size:12px;font-weight:700;background:{{ tabPracticeBg }};color:{{ tabPracticeColor }}\">Практика<\u002Fbutton>\n      <button onclick=\"{{ onTabReflection }}\" style=\"padding:7px 16px;font-size:12px;font-weight:700;background:{{ tabReflectionBg }};color:{{ tabReflectionColor }}\">Рефлексія<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Theory -->\n  <sc-if value=\"{{ isTabTheory }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px;overflow-y:auto\">\n    <div style=\"width:100%;max-width:660px;animation:fadeUp 0.4s ease\">\n      <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:10px;font-weight:600\">Теорія<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:30px;color:#191B1C;margin:0 0 6px;letter-spacing:-0.02em;line-height:1.1\">{{ theoryHeading }}<\u002Fh2>\n      <p style=\"font-size:16px;color:#5A5E63;margin:0 0 28px;font-style:italic\">{{ lessonSubtitleText }}<\u002Fp>\n      <div style=\"background:#fff;border:2px solid #191B1C;padding:24px 28px;margin-bottom:22px;box-shadow:4px 4px 0 0 #F2EFEA\"><p style=\"font-size:16px;color:#191B1C;line-height:1.8;margin:0\">{{ theoryText }}<\u002Fp><\u002Fdiv>\n\n      <!-- Video placeholder -->\n      <div style=\"background:#191B1C;aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:24px;position:relative;overflow:hidden;cursor:pointer\">\n        <img src=\"1dd3cb5d-383f-4851-8cc0-a8031f5a5211\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.1;pointer-events:none\" alt=\"\">\n        <div style=\"width:68px;height:68px;background:#FFDC1A;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 0 0 16px rgba(255,220,26,0.12),0 0 0 32px rgba(255,220,26,0.06)\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"#191B1C\"><polygon points=\"5,3 19,12 5,21\"><\u002Fpolygon><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'Archivo Black',sans-serif;font-size:15px;color:#FFDC1A;margin-bottom:4px\">{{ lessonLabel }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:rgba(255,255,255,0.35)\">Відеоурок · {{ lessonDuration }}<\u002Fdiv>\n        <div style=\"position:absolute;top:12px;left:14px;background:#FFDC1A;padding:3px 9px\"><span style=\"font-family:'Archivo Black',sans-serif;font-size:9px;color:#191B1C;letter-spacing:0.1em\">ВІДЕО<\u002Fspan><\u002Fdiv>\n        <div style=\"position:absolute;bottom:12px;right:14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.12);padding:3px 8px\">PLACEHOLDER<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Key principles -->\n      <div style=\"margin-bottom:24px\">\n        <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:14px;font-weight:700\">Ключові принципи<\u002Fdiv>\n        <sc-for list=\"{{ theoryPrinciples }}\" as=\"pr\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:14px;margin-bottom:12px;align-items:flex-start;padding:14px;background:#fff;border-left:4px solid #FFDC1A\">\n            <div style=\"width:8px;height:8px;background:#FFDC1A;flex-shrink:0;margin-top:5px\"><\u002Fdiv>\n            <p style=\"font-size:15px;color:#191B1C;margin:0;line-height:1.6\">{{ pr.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Infographic -->\n      <div style=\"background:#fff;border:2px solid #191B1C;padding:24px;margin-bottom:22px\">\n        <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:16px;font-weight:700\">Схема<\u002Fdiv>\n        {{ lessonInfoEl }}\n      <\u002Fdiv>\n\n      <!-- Example -->\n      <div style=\"background:#F5F3EE;border:2px solid #191B1C;padding:22px 26px;margin-bottom:22px\">\n        <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:14px;font-weight:700\">Приклад: Олена та Максим<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <div style=\"background:#FFF0F0;border-left:3px solid #E53E3E;padding:14px\">\n            <div style=\"font-size:10px;font-weight:700;color:#E53E3E;letter-spacing:0.05em;margin-bottom:8px;text-transform:uppercase\">Без медіатора<\u002Fdiv>\n            <p style=\"font-size:13px;color:#191B1C;margin:0;line-height:1.65\">{{ theoryExWithout }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#F0FFF8;border-left:3px solid #1F8A5B;padding:14px\">\n            <div style=\"font-size:10px;font-weight:700;color:#1F8A5B;letter-spacing:0.05em;margin-bottom:8px;text-transform:uppercase\">З медіатором<\u002Fdiv>\n            <p style=\"font-size:13px;color:#191B1C;margin:0;line-height:1.65\">{{ theoryExWith }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Key quote -->\n      <div style=\"background:#191B1C;padding:22px 26px;margin-bottom:40px\">\n        <p style=\"font-size:15px;color:#FFDC1A;line-height:1.65;margin:0;font-style:italic\">\"{{ theoryKeyPoint }}\"<\u002Fp>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ onTabPractice }}\" style=\"width:100%;background:#191B1C;color:#fff;font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:4px 4px 0 0 #FFDC1A\">Перейти до практики →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Practice -->\n  <sc-if value=\"{{ isTabPractice }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px;overflow-y:auto\">\n    <div style=\"width:100%;max-width:640px;animation:fadeUp 0.4s ease\">\n      <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:10px;font-weight:600\">Практика<\u002Fdiv>\n      <h3 style=\"font-family:'Archivo Black',sans-serif;font-size:22px;color:#191B1C;margin:0 0 8px;letter-spacing:-0.01em\">{{ practiceTitle }}<\u002Fh3>\n      <p style=\"font-size:14px;color:#5A5E63;margin:0 0 28px;line-height:1.55\">{{ practiceInstruction }}<\u002Fp>\n\n      <sc-if value=\"{{ isClassifyPractice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:28px\">\n        <sc-for list=\"{{ classifyItems }}\" as=\"ci\" hint-placeholder-count=\"6\">\n          <div style=\"background:{{ ci.bg }};border:2px solid {{ ci.border }};padding:16px;transition:background 0.15s\">\n            <p style=\"font-size:14px;color:#191B1C;margin:0 0 12px;line-height:1.5\">{{ ci.text }}<\u002Fp>\n            <div style=\"display:flex;gap:8px\">\n              <button onclick=\"{{ ci.onYes }}\" style=\"flex:1;background:{{ ci.yesBg }};color:{{ ci.yesColor }};border:1px solid {{ ci.yesBorder }};padding:8px;font-size:12px;font-weight:700\">Медіація<\u002Fbutton>\n              <button onclick=\"{{ ci.onNo }}\" style=\"flex:1;background:{{ ci.noBg }};color:{{ ci.noColor }};border:1px solid {{ ci.noBorder }};padding:8px;font-size:12px;font-weight:700\">Не підходить<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;color:{{ ci.resultColor }};margin-top:8px;line-height:1.45;display:{{ ci.resultDisplay }}\">{{ ci.resultText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isChoicePractice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:28px\">\n        <sc-for list=\"{{ practiceChoiceOptions }}\" as=\"pco\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ pco.onSelect }}\" style=\"text-align:left;background:{{ pco.bg }};border:2px solid {{ pco.border }};padding:16px 18px;font-size:15px;color:#191B1C;line-height:1.55;cursor:pointer;transition:all 0.12s\">\n            <span style=\"font-family:'Archivo Black',sans-serif;color:{{ pco.labelColor }};margin-right:8px\">{{ pco.label }}<\u002Fspan>{{ pco.text }}\n            <div style=\"font-size:12px;color:{{ pco.expColor }};margin-top:8px;display:{{ pco.expDisplay }};font-style:italic;line-height:1.5\">{{ pco.explanation }}<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isMatchPractice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:28px\">\n        <sc-for list=\"{{ matchOptions }}\" as=\"mo\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ mo.onToggle }}\" style=\"text-align:left;background:{{ mo.bg }};border:2px solid {{ mo.border }};padding:14px 16px;font-size:14px;color:#191B1C;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.12s\">\n            <div style=\"width:20px;height:20px;border:2px solid {{ mo.checkBorder }};background:{{ mo.checkBg }};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900\">{{ mo.checkMark }}<\u002Fdiv>\n            <span style=\"line-height:1.5;flex:1\">{{ mo.text }}<\u002Fspan>\n            <span style=\"font-size:11px;color:{{ mo.resultColor }};display:{{ mo.resultDisplay }};flex-shrink:0\">{{ mo.resultIcon }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isOrderPractice }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"font-size:13px;color:#5A5E63;margin:0 0 16px\">Натискайте кроки у правильному порядку (1→5). Натисніть знову — щоб скасувати.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:28px\">\n        <sc-for list=\"{{ orderItems }}\" as=\"oi\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ oi.onClick }}\" style=\"display:flex;align-items:center;gap:14px;width:100%;border:2px solid {{ oi.border }};padding:14px 16px;background:{{ oi.bg }};text-align:left;cursor:pointer;transition:all 0.15s\">\n            <div style=\"width:34px;height:34px;background:{{ oi.numBg }};color:{{ oi.numColor }};font-family:'Archivo Black',sans-serif;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0\">{{ oi.numDisplay }}<\u002Fdiv>\n            <span style=\"font-size:14px;color:{{ oi.textColor }};line-height:1.5;flex:1\">{{ oi.text }}<\u002Fspan>\n            <span style=\"font-size:13px;display:{{ oi.resultDisplay }};color:{{ oi.resultColor }}\">{{ oi.resultIcon }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isPracticeSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:{{ pracFeedBg }};border:2px solid {{ pracFeedBorder }};padding:14px 18px;margin-bottom:18px\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:15px;color:{{ pracFeedTitleColor }};margin-bottom:4px\">{{ pracFeedTitle }}<\u002Fdiv><p style=\"font-size:13px;color:#191B1C;margin:0;line-height:1.5\">{{ pracFeedText }}<\u002Fp><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showPracticeSubmit }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ onSubmitPractice }}\" style=\"width:100%;background:#191B1C;color:#fff;font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:4px 4px 0 0 #FFDC1A;margin-bottom:12px\">Перевірити →<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showPracticeNext }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ onTabReflection }}\" style=\"width:100%;background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:4px 4px 0 0 #191B1C\">Перейти до рефлексії →<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Reflection -->\n  <sc-if value=\"{{ isTabReflection }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px;overflow-y:auto\">\n    <div style=\"width:100%;max-width:640px;animation:fadeUp 0.4s ease\">\n      <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;margin-bottom:10px;font-weight:600\">Рефлексія<\u002Fdiv>\n      <h3 style=\"font-family:'Archivo Black',sans-serif;font-size:22px;color:#191B1C;margin:0 0 6px;letter-spacing:-0.01em;line-height:1.2\">{{ reflectionTitle }}<\u002Fh3>\n      <p style=\"font-size:14px;color:#5A5E63;margin:0 0 28px;line-height:1.55\">Відповіді збережуться у вашому звіті<\u002Fp>\n\n      <sc-for list=\"{{ reflectionQuestions }}\" as=\"rq\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:2px solid #191B1C;padding:22px;margin-bottom:16px;box-shadow:2px 2px 0 0 #F2EFEA\">\n          <p style=\"font-size:15px;font-weight:700;color:#191B1C;margin:0 0 16px;line-height:1.45\">{{ rq.qNum }}. {{ rq.question }}<\u002Fp>\n\n          <sc-if value=\"{{ rq.isText }}\" hint-placeholder-val=\"{{ false }}\">\n          <textarea value=\"{{ rq.textValue }}\" oninput=\"{{ rq.onTextChange }}\" placeholder=\"Ваші думки...\" style=\"width:100%;min-height:110px;border:1px solid #D5D2CC;padding:14px;font-size:14px;color:#191B1C;line-height:1.65;background:#FAFAF8;resize:vertical\"><\u002Ftextarea>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ rq.isSlider }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:4px 0\">\n            <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\">\n              <span style=\"font-size:12px;font-weight:700;color:#191B1C;max-width:44%;line-height:1.35\">{{ rq.leftLabel }}<\u002Fspan>\n              <span style=\"font-size:12px;font-weight:700;color:#191B1C;max-width:44%;text-align:right;line-height:1.35\">{{ rq.rightLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <input type=\"range\" min=\"1\" max=\"10\" value=\"{{ rq.sliderValue }}\" oninput=\"{{ rq.onSliderChange }}\">\n            <div style=\"text-align:center;margin-top:10px\"><span style=\"display:inline-block;background:#191B1C;color:#FFDC1A;font-family:'Archivo Black',sans-serif;font-size:18px;padding:5px 14px\">{{ rq.sliderValue }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ rq.isChoice }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ rq.options }}\" as=\"ro\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ ro.onClick }}\" style=\"text-align:left;padding:11px 14px;border:2px solid {{ ro.border }};background:{{ ro.bg }};font-size:14px;color:{{ ro.color }};line-height:1.5;cursor:pointer;transition:all 0.12s\">{{ ro.text }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <button onclick=\"{{ onCompleteLesson }}\" style=\"width:100%;background:{{ completeBtnBg }};color:{{ completeBtnColor }};font-family:'Archivo Black',sans-serif;font-size:16px;padding:16px;box-shadow:{{ completeBtnShadow }};cursor:{{ completeBtnCursor }};margin-top:8px;transition:all 0.2s\">{{ completeBtnLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ FINAL LOADING ══ -->\n<sc-if value=\"{{ isFinalLoading }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#191B1C;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden\">\n  <img src=\"1dd3cb5d-383f-4851-8cc0-a8031f5a5211\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.07;pointer-events:none\" alt=\"\">\n  <div style=\"text-align:center;position:relative;z-index:1\">\n    <div style=\"width:72px;height:72px;border:3px solid rgba(255,220,26,0.25);border-top-color:#FFDC1A;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 32px\"><\u002Fdiv>\n    <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:26px;color:#fff;margin:0 0 12px\">Порівнюємо ваш прогрес...<\u002Fh2>\n    <p style=\"font-size:15px;color:rgba(255,255,255,0.4);max-width:340px;line-height:1.6;margin:0 auto\">AI оцінює розвиток та готує порівняльний аналіз<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ FINAL RESULTS ══ -->\n<sc-if value=\"{{ isFinalResults }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#FAF8F2;display:flex;flex-direction:column\">\n  <div style=\"background:#191B1C;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0\">\n    <img src=\"d951551d-d8d8-4dbc-b9d4-cfa90659da7b\" style=\"height:20px;filter:brightness(0) invert(1)\" alt=\"KP\">\n    <div style=\"display:flex;gap:12px\">\n      <button onclick=\"{{ onOpenPrint }}\" style=\"background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:12px;padding:7px 14px;border:1px solid rgba(255,255,255,0.15)\">Завантажити звіт<\u002Fbutton>\n      <span style=\"font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.08em;text-transform:uppercase;line-height:40px\">Ваш прогрес<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:48px 32px;max-width:1060px;margin:0 auto;width:100%\">\n    <div style=\"text-align:center;margin-bottom:44px\">\n      <div style=\"display:inline-block;background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:10px;letter-spacing:0.13em;padding:5px 14px;margin-bottom:14px;text-transform:uppercase\">Результати курсу<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:34px;color:#191B1C;margin:0;letter-spacing:-0.02em;line-height:1.1\">{{ finalTitle }}<\u002Fh2>\n      <p style=\"font-size:15px;color:#5A5E63;margin:10px 0 0;line-height:1.6\">{{ finalSubtitle }}<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px\">\n      <div style=\"background:#191B1C;padding:28px;box-shadow:6px 6px 0 0 #5A5E63\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.35);margin-bottom:12px;font-weight:700\">До курсу<\u002Fdiv><div style=\"font-family:'Archivo Black',sans-serif;font-size:17px;color:rgba(255,255,255,0.6);margin-bottom:16px\">{{ initialProfileType }}<\u002Fdiv><div style=\"display:flex;justify-content:center\">{{ initialRadarEl }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#191B1C;padding:28px;box-shadow:6px 6px 0 0 #FFDC1A\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#FFDC1A;margin-bottom:12px;font-weight:700\">Після курсу<\u002Fdiv><div style=\"font-family:'Archivo Black',sans-serif;font-size:17px;color:#FFDC1A;margin-bottom:16px\">{{ finalProfileType }}<\u002Fdiv><div style=\"display:flex;justify-content:center\">{{ finalRadarEl }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:2px solid #191B1C;padding:24px;margin-bottom:20px;box-shadow:4px 4px 0 0 #FFDC1A\">\n      <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:16px\">Зростання по компетенціях<\u002Fdiv>\n      <sc-for list=\"{{ growthBars }}\" as=\"gb\" hint-placeholder-count=\"5\">\n        <div style=\"margin-bottom:18px\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:5px\"><span style=\"font-size:13px;font-weight:600;color:#191B1C\">{{ gb.label }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:{{ gb.deltaColor }};font-weight:700\">{{ gb.delta }}<\u002Fspan><\u002Fdiv><div style=\"height:8px;background:#E8E5DF;display:flex\"><div style=\"background:#5A5E63;width:{{ gb.beforeWidth }};height:100%\"><\u002Fdiv><div style=\"background:#FFDC1A;width:{{ gb.gainWidth }};height:100%\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:16px;margin-top:4px\"><span style=\"font-size:11px;color:#5A5E63\">До: {{ gb.before }}%<\u002Fspan><span style=\"font-size:11px;color:#191B1C;font-weight:600\">Після: {{ gb.after }}%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"background:#FFFBEB;border:2px solid #FFDC1A;padding:22px;margin-bottom:28px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:10px\">Підсумок AI<\u002Fdiv><p style=\"font-size:15px;color:#191B1C;line-height:1.7;margin:0\">{{ finalAnalysis }}<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;justify-content:center\">\n      <button onclick=\"{{ onOpenPrint }}\" style=\"background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:15px;padding:14px 32px;box-shadow:4px 4px 0 0 #191B1C\">Завантажити повний звіт<\u002Fbutton>\n      <button onclick=\"{{ onRestart }}\" style=\"background:rgba(25,27,28,0.08);color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:15px;padding:14px 32px;border:2px solid #191B1C\">Пройти знову<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══ PRINT REPORT ══ -->\n<sc-if value=\"{{ isPrint }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#F5F3EE\">\n  <!-- Top bar (hidden on print) -->\n  <div class=\"no-print\" style=\"background:#191B1C;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10\">\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <button onclick=\"{{ onBackFromPrint }}\" style=\"background:none;color:rgba(255,255,255,0.5);font-size:13px;padding:0\">← Назад<\u002Fbutton>\n      <span style=\"font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em\">Перегляд звіту<\u002Fspan>\n    <\u002Fdiv>\n    <button onclick=\"{{ onPrint }}\" style=\"background:#FFDC1A;color:#191B1C;font-family:'Archivo Black',sans-serif;font-size:14px;padding:10px 24px;box-shadow:3px 3px 0 0 rgba(255,220,26,0.4)\">Надрукувати / Зберегти PDF<\u002Fbutton>\n  <\u002Fdiv>\n  <!-- Printable page -->\n  <div class=\"print-page\" style=\"max-width:820px;margin:0 auto;padding:48px 40px;background:#fff;min-height:100vh\">\n    <!-- Header -->\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:24px;border-bottom:3px solid #191B1C;margin-bottom:36px\">\n      <div>\n        <img src=\"d951551d-d8d8-4dbc-b9d4-cfa90659da7b\" style=\"height:24px;margin-bottom:12px;display:block\" alt=\"KnowPack\">\n        <h1 style=\"font-family:'Archivo Black',sans-serif;font-size:28px;color:#191B1C;margin:0 0 4px;letter-spacing:-0.02em\">Профіль медіатора<\u002Fh1>\n        <p style=\"font-size:14px;color:#5A5E63;margin:0\">Персональний звіт курсу з медіації · {{ printDate }}<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#191B1C;padding:14px 18px;text-align:center\">\n        <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#FFDC1A;margin-bottom:4px;font-weight:700\">Ваш тип<\u002Fdiv>\n        <div style=\"font-family:'Archivo Black',sans-serif;font-size:14px;color:#fff\">{{ printProfileType }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Profile section -->\n    <div style=\"display:grid;grid-template-columns:200px 1fr;gap:32px;margin-bottom:40px;align-items:start\">\n      <div style=\"display:flex;justify-content:center\">{{ printRadarEl }}<\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:8px\">Аналіз<\u002Fdiv>\n        <p style=\"font-size:14px;color:#191B1C;line-height:1.7;margin:0 0 20px\">{{ printProfileAnalysis }}<\u002Fp>\n        <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:12px\">Рекомендації<\u002Fdiv>\n        <sc-for list=\"{{ printRecommendations }}\" as=\"pr\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;gap:10px;margin-bottom:8px\"><div style=\"width:18px;height:18px;background:#FFDC1A;font-family:'Archivo Black',sans-serif;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#191B1C\">{{ pr.num }}<\u002Fdiv><p style=\"font-size:13px;color:#191B1C;margin:0;line-height:1.55\">{{ pr.text }}<\u002Fp><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Competencies bar chart -->\n    <div style=\"margin-bottom:40px;padding:20px 24px;background:#F5F3EE;border-left:4px solid #FFDC1A\">\n      <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5A5E63;font-weight:700;margin-bottom:14px\">Компетенції<\u002Fdiv>\n      <sc-for list=\"{{ printCompetencies }}\" as=\"pc\" hint-placeholder-count=\"5\">\n        <div style=\"margin-bottom:10px\"><div style=\"display:flex;justify-content:space-between;margin-bottom:3px\"><span style=\"font-size:13px;font-weight:600;color:#191B1C\">{{ pc.label }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5A5E63\">{{ pc.value }}%<\u002Fspan><\u002Fdiv><div style=\"height:5px;background:#E8E5DF\"><div style=\"height:100%;background:#191B1C;width:{{ pc.width }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <!-- Reflections per lesson -->\n    <div style=\"border-top:2px solid #191B1C;padding-top:28px\">\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:22px;color:#191B1C;margin:0 0 24px;letter-spacing:-0.01em\">Рефлексія по уроках<\u002Fh2>\n      <sc-for list=\"{{ printLessons }}\" as=\"pl\" hint-placeholder-count=\"5\">\n        <div style=\"margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid #E8E5DF\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px\">\n            <div style=\"background:#191B1C;color:#FFDC1A;font-family:'Archivo Black',sans-serif;font-size:11px;padding:4px 10px\">Урок {{ pl.num }}<\u002Fdiv>\n            <h3 style=\"font-family:'Archivo Black',sans-serif;font-size:16px;color:#191B1C;margin:0;letter-spacing:-0.01em\">{{ pl.title }}<\u002Fh3>\n          <\u002Fdiv>\n          <sc-for list=\"{{ pl.answers }}\" as=\"pa\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:16px;padding:14px 16px;background:#FAFAF8;border-left:3px solid #E8E5DF\">\n              <div style=\"font-size:11px;font-weight:700;color:#5A5E63;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em\">Питання {{ pa.qNum }}<\u002Fdiv>\n              <p style=\"font-size:13px;font-weight:600;color:#191B1C;margin:0 0 6px;line-height:1.45\">{{ pa.question }}<\u002Fp>\n              <p style=\"font-size:13px;color:{{ pa.answerColor }};margin:0;line-height:1.6;font-style:{{ pa.answerStyle }}\">{{ pa.answer }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <!-- Footer -->\n    <div style=\"border-top:2px solid #191B1C;padding-top:16px;display:flex;justify-content:space-between;align-items:center\">\n      <p style=\"font-size:11px;color:#5A5E63;margin:0\">Your knowledge. Our craft. Their growth.<\u002Fp>\n      <p style=\"font-size:11px;color:#5A5E63;margin:0\">knowpack.com<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n\n  COMP_LABELS = { listening:'Активне слухання', neutrality:'Нейтральність', questions:'Постановка питань', interests:'Пошук інтересів', solutions:'Генерація рішень' }\n  COMP_KEYS = ['listening','neutrality','questions','interests','solutions']\n\n  INITIAL_SC = { title:'Конфлікт у компанії', context:'Вас призначено медіатором. Допоможіть двом колегам знайти рішення.', char1:{name:'Олена Коваль',role:'Головний бухгалтер',avatar:'👩‍💼'}, char2:{name:'Максим Петренко',role:'Директор відділу продажів',avatar:'👨‍💼'}, situation:'Олена звинувачує команду Максима у систематичному перевищенні фінансових лімітів та ігноруванні процедур. На її думку, це підриває фінансову стабільність компанії. Максим вважає, що бухгалтерія занадто негнучка, блокує важливі угоди та шкодить бізнесу.', stakes:'Обидва фахівці критично важливі. Конфлікт загострився до точки, де прямий діалог між ними неможливий.' }\n  FINAL_SC = { title:'Новий виклик', context:'Після 5 уроків — час перевірити себе в новій ситуації.', char1:{name:'Ірина Мороз',role:'HR-менеджер',avatar:'👩‍💻'}, char2:{name:'Сергій Білий',role:'Керівник проекту',avatar:'👨‍💼'}, situation:'Ірина наполягає на повному 3-тижневому онбординзі нових співробітників — це стандарт якості та юридична безпека. Сергій вимагає пришвидшити: критичний проект горить, дедлайн за 2 тижні, нові люди потрібні негайно.', stakes:'Троє нових фахівців чекають. На кону — репутація HR-відділу та успіх стратегічного проекту.' }\n\n  STEPS_I = [\n    {type:'scenario'},\n    {type:'slider',num:1,key:'slider1',question:'Ваша початкова позиція як медіатора',leftLabel:'Підтримую Олену',leftSub:'Вона явно має рацію',rightLabel:'Підтримую Максима',rightSub:'Він має рацію'},\n    {type:'slider',num:2,key:'slider2',question:'Ваш природній стиль слухання у конфлікті',leftLabel:'Слухаю мовчки',leftSub:'Даю виговоритись',rightLabel:'Структурую діалог',rightSub:'Направляю розмову'},\n    {type:'slider',num:3,key:'slider3',question:'Що для вас важливіше у вирішенні конфлікту?',leftLabel:'Знайти компроміс',leftSub:'Зупинити конфлікт швидко',rightLabel:'Зрозуміти інтереси',rightSub:'Знайти справжні потреби'},\n    {type:'choice',num:4,key:'choice4',question:'Як ви відкриєте медіаційну сесію з Оленою та Максимом?',options:[{id:'a',text:'Розкажіть мені, що між вами сталося. Хто хоче почати?'},{id:'b',text:'Я тут як нейтральна сторона — не суддя. Мета: знайти рішення, яке влаштує обох. Говоримо по черзі, без звинувачень. Хто розпочне?'},{id:'c',text:'Олено, оскільки ви подали запит — ви й починайте.'}]},\n    {type:'choice',num:5,key:'choice5',question:'Олена каже: \"Максим завжди ігнорує наші вимоги!\" Ваша реакція:',options:[{id:'a',text:'Я розумію ваше розчарування, Олено.'},{id:'b',text:'Олено, я чую, що це вас дуже засмучує. Максиме, як ви бачите це питання?'},{id:'c',text:'\"Завжди\" — сильне слово. Максиме, що ви думаєте про конкретні ситуації?'}]},\n    {type:'voice',num:6,key:'voice6',question:'Що б ви сказали Максиму, щоб зрозуміти його справжні інтереси — не позицію?',hint:'Сформулюйте питання або фразу медіатора для Максима. Говоріть або пишіть.'},\n  ]\n  STEPS_F = [\n    {type:'scenario'},\n    {type:'slider',num:1,key:'slider1',question:'Ваша початкова позиція у новому конфлікті',leftLabel:'Підтримую Ірину',leftSub:'Процедури важливі',rightLabel:'Підтримую Сергія',rightSub:'Дедлайн — реальність'},\n    {type:'slider',num:2,key:'slider2',question:'Як ви слухатимете сторони?',leftLabel:'Слухаю мовчки',leftSub:'Даю виговоритись',rightLabel:'Структурую',rightSub:'Направляю до суті'},\n    {type:'slider',num:3,key:'slider3',question:'Ваш пріоритет?',leftLabel:'Швидкий компроміс',leftSub:'Час важливий',rightLabel:'Глибокі інтереси',rightSub:'Стійке рішення'},\n    {type:'choice',num:4,key:'choice4',question:'Як ви відкриєте сесію з Іриною та Сергієм?',options:[{id:'a',text:'Іринo, розкажіть вашу версію ситуації.'},{id:'b',text:'Дякую, що прийшли. Я тут, щоб допомогти знайти рішення — не вирішувати, хто правий. Говоримо по черзі, без звинувачень. Хто почне?'},{id:'c',text:'Розкажіть, що між вами відбувається.'}]},\n    {type:'choice',num:5,key:'choice5',question:'Сергій каже: \"Ірина завжди гальмує процеси!\" Ваша реакція:',options:[{id:'a',text:'Я розумію вашу стурбованість, Сергію.'},{id:'b',text:'Сергію, я чую, що ця ситуація для вас критична. Іринo, як ви бачите ситуацію?'},{id:'c',text:'\"Завжди\" — це узагальнення. Що саме вас турбує зараз, у цьому конкретному випадку?'}]},\n    {type:'voice',num:6,key:'voice6',question:'Що б ви сказали Ірині, щоб зрозуміти її справжні інтереси?',hint:'Сформулюйте питання або фразу для Ірини.'},\n  ]\n\n  LESSONS = [\n    { id:1, title:'Основи медіації', subtitle:'Що таке медіація і коли вона потрібна', duration:'25 хв',\n      theory:{\n        heading:'Медіація — не суд і не переговори',\n        text:'Медіація — добровільний, конфіденційний процес, у якому нейтральна третя сторона допомагає конфліктуючим сторонам самостійно знайти взаємоприйнятне рішення. Ключове слово — самостійно. Медіатор не приймає рішень і не визначає, хто правий. Він створює умови, в яких сторони можуть почути одне одного, виразити свої справжні потреби і дійти до угоди, яка влаштовує обох.',\n        exampleWithout:'Директор скликає нараду. Олена й Максим сидять по різні боки столу. За 20 хвилин — крики, звинувачення, директор змушений \"судити\". Через тиждень ситуація повторюється — образи лише зростають.',\n        exampleWith:'Медіатор зустрічається з кожним окремо. Обидва відчувають, що їх почули. На спільній сесії атмосфера вже не ворожа — люди говорять про процеси, а не про особистості. За 90 хвилин — перший конкретний план дій.',\n        principles:[\n          {text:'Добровільність — участь без примусу, право вийти з процесу в будь-який момент'},\n          {text:'Конфіденційність — все сказане залишається в межах сесії і не може бути використане проти сторін'},\n          {text:'Нейтральність — медіатор однаково поважає обидві сторони і не має особистого інтересу у результаті'},\n          {text:'Самовизначення — рішення приймають самі сторони, медіатор лише допомагає дійти до нього'},\n        ],\n        keyPoint:'Медіатор — не арбітр і не психолог. Це фасилітатор, який допомагає людям чути одне одного. Його сила — у структурі процесу та нейтральності.',\n      },\n      practice:{ type:'classify', title:'Медіація чи ні?', instruction:'Визначте, яка ситуація підходить для медіації, а яка — ні. Відповідайте для кожного випадку.', items:[\n        {id:1,text:'Два відділи сваряться через спільний бюджет і не можуть домовитись',answer:true,explanation:'Так — є дві сторони та спільний інтерес у рішенні. Добровільний діалог можливий.'},\n        {id:2,text:'Співробітника звинувачують у крадіжці корпоративних коштів',answer:false,explanation:'Ні — потрібне розслідування та юридичний процес. Медіація не підходить, коли є правопорушення.'},\n        {id:3,text:'HR і тімлід не можуть узгодити гібридний графік відділу',answer:true,explanation:'Так — обидві сторони мають право вирішувати, медіація доречна.'},\n        {id:4,text:'Один із партнерів хоче розірвати бізнес через шахрайство іншого',answer:false,explanation:'Ні — наявність правопорушення потребує юридичних інструментів, не медіації.'},\n        {id:5,text:'Команда та PM конфліктують через пріоритети спринту',answer:true,explanation:'Так — добровільний діалог з нейтральною особою може допомогти знайти баланс.'},\n        {id:6,text:'Керівник хоче звільнити підлеглого без пояснень',answer:false,explanation:'Ні — відсутня рівність сторін, одна має всю владу, інша — під тиском.'},\n      ]},\n      reflections:[\n        {type:'choice',question:'Яка характеристика медіатора, на ваш погляд, найважливіша?',options:['Абсолютна нейтральність — не на чиїйсь стороні','Емпатія — вміння відчути стан кожної сторони','Структурованість — чіткий процес і дотримання правил','Досвід — знання типових сценаріїв конфліктів']},\n        {type:'text',question:'Пригадайте реальний конфлікт на роботі, де медіація могла б допомогти. Опишіть коротко: у чому полягав конфлікт і чому нейтральний медіатор міг би змінити результат?'},\n        {type:'slider',question:'Наскільки легко вам зберігати нейтральність, коли ви бачите, що одна зі сторін явно помиляється?',leftLabel:'Дуже важко — маю власну думку',rightLabel:'Легко — бачу обидві сторони рівно'},\n      ],\n    },\n    { id:2, title:'Активне слухання', subtitle:'Чути — значить розуміти', duration:'25 хв',\n      theory:{\n        heading:'Слухати — це не мовчати',\n        text:'Активне слухання — уміння дати людині відчути, що її почули. Це не просто тиша. Це перефразування, відображення емоцій, уточнення та підсумовування. Медіатор, який справді слухає, знижує напругу вже за перші 10 хвилин сесії. Люди стають більш відкритими, коли відчувають, що їх розуміють — до того, як їх просять зрозуміти когось іншого.',\n        exampleWithout:'Медіатор: \"Я зрозумів. Максиме, тепер ви.\" Максим: \"Знову ніхто не слухає!\" — і виходить із кімнати. Сесія зупиняється ще до початку реальної розмови.',\n        exampleWith:'Медіатор: \"Олено, якщо я правильно розумію — три місяці ви намагались вирішити це в межах процедур, і кожного разу відчували, що вас ігнорують. Чи правильно я вас зрозумів?\" Олена: \"Саме так. Дякую, що нарешті почули.\"',\n        principles:[\n          {text:'Перефразування: повторіть суть своїми словами, щоб перевірити розуміння — \"Якщо я правильно зрозумів...\"'},\n          {text:'Відображення емоцій: назвіть почуття сторони — \"Схоже, ви відчуваєте розчарування...\"'},\n          {text:'Уточнення: задавайте питання для прояснення — \"Правильно я розумію, що...?\"'},\n          {text:'Підсумовування: регулярно збирайте ключові думки — \"Отже, для вас важливо...\"'},\n        ],\n        keyPoint:'Людина хоче, щоб її зрозуміли — перш ніж сама починає розуміти інших. Дайте цей досвід кожній стороні.',\n      },\n      practice:{ type:'choice', title:'Хто слухає краще?', instruction:'Олена каже: \"Я вже три місяці намагаюся пояснити Максиму, як працює бюджет — він мене ігнорує!\" Яка відповідь медіатора найкраща?', options:[\n        {id:'a',text:'Я розумію, це дійсно важко.',correct:false,explanation:'Занадто загально. Не відображає конкретного почуття та не перевіряє розуміння.'},\n        {id:'b',text:'Схоже, ви відчуваєте розчарування від того, що ваші зусилля залишаються непоміченими. Чи правильно я розумію?',correct:true,explanation:'Відображення емоції + перевірка розуміння = класичне активне слухання.'},\n        {id:'c',text:'Максиме, ви чуєте, що Олена три місяці намагається?',correct:false,explanation:'Медіатор виступає адвокатом Олени — це порушує нейтральність.'},\n      ]},\n      reflections:[\n        {type:'choice',question:'Яку техніку активного слухання ви використовуєте найменше у своїй роботі?',options:['Перефразування — повторення суті своїми словами','Відображення емоцій — \"Схоже, ви відчуваєте...\"','Уточнення — \"Правильно я розумію, що...?\"','Підсумовування — збір ключових думок']},\n        {type:'text',question:'Згадайте момент, коли вас справді добре вислухали. Що конкретно зробила та людина? Що ви відчули?'},\n        {type:'slider',question:'Наскільки терпляче ви слухаєте під час конфліктної розмови, не перебиваючи і не поспішаючи відповісти?',leftLabel:'Перериваю або думаю про відповідь',rightLabel:'Слухаю до кінця, потім реагую'},\n      ],\n    },\n    { id:3, title:'Мистецтво питань', subtitle:'Від допиту до діалогу', duration:'25 хв',\n      theory:{\n        heading:'Відкриті питання — головний інструмент',\n        text:'Питання — це те, що відрізняє медіатора від судді. Відкриті питання відкривають простір для роздумів і допомагають людям самостійно приходити до розуміння. Закриті питання — закривають. Рефреймінг перефокусовує розмову з проблеми на можливості. Гіпотетичне питання знімає напругу і переносить людину у простір рішень.',\n        exampleWithout:'Медіатор: \"Чому ви не погоджуєтесь із процедурами?\" Максим одразу починає захищатись: \"Я погоджуюсь! Це Олена не розуміє реальності бізнесу!\" Розмова зайшла у глухий кут.',\n        exampleWith:'Медіатор: \"Максиме, що б змінилось для вас, якби процес погодження займав 2 години замість 3 днів?\" Максим думає... \"Ми б не втрачали клієнтів у критичний момент.\" Розмова перейшла від конфлікту до реальних потреб.',\n        principles:[\n          {text:'Відкриті: \"Що?\", \"Як?\", \"Розкажіть про...\" — дають простір для розгорнутої відповіді'},\n          {text:'Уникайте \"Чому?\" — часто звучить як звинувачення. Замість цього: \"Що привело вас до цього?\"'},\n          {text:'Рефреймінг: \"Чого б ви хотіли замість цього?\" — перефокусує на майбутнє'},\n          {text:'Гіпотетичне: \"Уявіть, що проблему вирішено — як виглядає ваша робота?\" — знімає напругу'},\n        ],\n        keyPoint:'Хороший медіатор не дає відповідей. Він задає питання, які допомагають сторонам знайти їх самостійно.',\n      },\n      practice:{ type:'choice', title:'Знайдіть правильне питання', instruction:'Максим каже: \"Вона хоче, щоб ми запитували дозволу на кожну копійку!\" Яке питання медіатора найефективніше?', options:[\n        {id:'a',text:'Чому ви так думаєте?',correct:false,explanation:'\"Чому\" часто сприймається як звинувачення і ставить у захисну позицію.'},\n        {id:'b',text:'Максиме, які умови дозволили б вам працювати ефективно без затримок?',correct:true,explanation:'Відкрите питання про майбутнє, орієнтоване на інтереси — а не на позицію.'},\n        {id:'c',text:'Олена погоджується з цим?',correct:false,explanation:'Закрите питання, яке може посилити протистояння між сторонами.'},\n      ]},\n      reflections:[\n        {type:'choice',question:'Який тип питань вам найважче формулювати в реальній розмові?',options:['Відкриті — \"Що для вас важливо у цій ситуації?\"','Гіпотетичні — \"Уявіть, що конфлікт вирішено...\"','Рефреймінгові — \"Чого б ви хотіли замість цього?\"','Уточнюючі — \"Правильно я розумію, що...?\"']},\n        {type:'text',question:'Сформулюйте 2 відкритих питання, які б ви поставили Олені, щоб зрозуміти її справжні потреби — не позицію \"хочу контроль\", а те, що за цим стоїть.'},\n        {type:'slider',question:'Наскільки часто ви використовуєте відкриті питання (замість стверджень або порад) у своїй щоденній роботі?',leftLabel:'Майже ніколи — переважно ствердження',rightLabel:'Постійно — питання як основний інструмент'},\n      ],\n    },\n    { id:4, title:'Позиції та інтереси', subtitle:'Айсберг конфлікту', duration:'25 хв',\n      theory:{\n        heading:'За кожною позицією — інтерес',\n        text:'Позиція — те, чого людина вимагає відкрито. Інтерес — чому вона цього хоче. Медіатор завжди копає глибше позицій. Олена вимагає погодження кожного платежу (позиція). Але за цим стоять страх особистої відповідальності, потреба у захисті та повазі до її фаху (інтереси). Максим хоче свободи дій (позиція), але насправді — можливість виконати план і довіру від керівництва (інтереси). Якщо зосередитись лише на позиціях, угода неможлива. Якщо знайти спільні інтереси — рішення з\\'являється.',\n        exampleWithout:'Переговори: \"Я хочу погоджувати все!\" — \"Я не буду погоджувати дрібниці!\" Обидва стоять на своїх позиціях. Пат. Директор мусить прийняти рішення сам — і знову ніхто не задоволений.',\n        exampleWith:'Медіатор: \"Олено, для чого вам важливо погоджувати кожен платіж?\" — \"Щоб не відповідати особисто за порушення лімітів.\" Медіатор: \"Максиме, що б допомогло вам діяти швидко і при цьому не ставити Олену під удар?\" Нова угода вже формується.',\n        principles:[\n          {text:'Позиція — те, що сторона вимагає відкрито: \"Я хочу X\"'},\n          {text:'Інтерес — потреба або цінність, яка стоїть за цією вимогою'},\n          {text:'Питання для виявлення: \"Для чого вам важливо X?\", \"Що це дасть вам?\"'},\n          {text:'Спільні інтереси — основа будь-якої угоди. Шукайте їх активно'},\n        ],\n        keyPoint:'Конфлікт — це айсберг. Позиції — на поверхні. Рішення завжди ховається під водою, у сфері інтересів.',\n      },\n      practice:{ type:'match', title:'Знайдіть справжні інтереси', instruction:'Максим каже: \"Хочу повну свободу витрат до 50 000 грн без будь-якого погодження.\" Оберіть ВСІ справжні інтереси за цією позицією:', options:[\n        {id:'a',text:'Укладати угоди швидко, без затримок у критичний момент',correct:true},\n        {id:'b',text:'Особисто не підпорядковуватись Олені',correct:false},\n        {id:'c',text:'Виконувати план продажів та KPI без перешкод',correct:true},\n        {id:'d',text:'Ігнорувати фінансовий контроль взагалі',correct:false},\n        {id:'e',text:'Отримати довіру та автономію від керівництва',correct:true},\n      ]},\n      reflections:[\n        {type:'text',question:'Подумайте про Олену. Які 2–3 інтереси (потреби, цінності, страхи) можуть стояти за її позицією \"все повинно бути погоджено зі мною\"?'},\n        {type:'choice',question:'Що найчастіше заважає вам побачити інтереси за позицією іншої людини?',options:['Брак часу — ніколи глибоко копати','Власні емоції — важко слухати, коли злий','Власна позиція — я вже знаю, хто правий','Брак інформації — людина не розповідає про себе']},\n        {type:'slider',question:'Наскільки легко вам у реальних розмовах знаходити спільні інтереси між сторонами, які конфліктують?',leftLabel:'Дуже важко — застрягаю на позиціях',rightLabel:'Легко — бачу інтереси за словами'},\n      ],\n    },\n    { id:5, title:'Від конфлікту до угоди', subtitle:'Структура медіаційної сесії', duration:'30 хв',\n      theory:{\n        heading:'5 фаз медіаційної сесії',\n        text:'Успішна медіація — структурований процес, а не хаотичний діалог. Кожна фаза має свою роль і логіку. Пропущена фаза повертає вас на початок або залишає угоду крихкою. Найпоширеніша помилка початківця — переходити до генерації рішень (фаза 4), не розібравшись з інтересами (фаза 3). Такі угоди не тримаються довше тижня.',\n        exampleWithout:'Після першої ж спільної зустрічі медіатор каже: \"Отже, давайте придумаємо варіанти.\" Олена й Максим пропонують взаємовиключні рішення. Атмосфера знову напружена. Сесія провалилась.',\n        exampleWith:'Фаза 1: Медіатор пояснює правила. Фаза 2: Олена говорить 15 хвилин без перебивань — Максим слухає. Максим — 15 хвилин. Фаза 3: Медіатор задає питання обом, щоб виявити інтереси. Фаза 4: Усі разом генерують варіанти. Фаза 5: Записують конкретну домовленість — хто, що, коли.',\n        principles:[\n          {text:'Фаза 1 — Вступ: встановлення правил, ролей та довіри між сторонами'},\n          {text:'Фаза 2 — Виклад позицій: кожна сторона говорить, медіатор слухає і не перебиває'},\n          {text:'Фаза 3 — Виявлення інтересів: медіатор копає глибше за допомогою відкритих питань'},\n          {text:'Фаза 4 — Генерація варіантів: спільний пошук рішень без критики та оцінки'},\n          {text:'Фаза 5 — Угода: фіксація конкретних домовленостей — усно або письмово'},\n        ],\n        keyPoint:'Не поспішайте до фази 4. Без глибокого розуміння інтересів (фаза 3) угода не протримається. Довіра будується в перших трьох фазах.',\n      },\n      practice:{ type:'order', title:'Складіть сесію', instruction:'Натискайте кроки у правильному порядку проведення медіаційної сесії (від 1 до 5). Натисніть знову — щоб скасувати.', items:[\n        {id:'e',text:'Фіксуємо конкретні домовленості — хто, що, коли',order:5},\n        {id:'a',text:'Пояснюємо правила, свою роль і мету зустрічі',order:1},\n        {id:'c',text:'Ставимо питання: \"Що для вас важливо?\", \"Чого хочете досягти?\"',order:3},\n        {id:'b',text:'Даємо кожній стороні висловитись без перебивань',order:2},\n        {id:'d',text:'Разом генеруємо варіанти рішень — без критики',order:4},\n      ]},\n      reflections:[\n        {type:'choice',question:'Яка фаза медіаційної сесії здається вам особисто найскладнішою для проведення?',options:['Вступ — встановлення довіри та правил','Виклад позицій — тримати баланс і не перебивати','Виявлення інтересів — глибокі питання під напругою','Генерація варіантів — обидва генерують, не критикуючи','Угода — фіксувати конкретно і справедливо']},\n        {type:'text',question:'Уявіть, що ви відкриваєте першу сесію з Оленою та Максимом. Напишіть ваші перші 3–4 речення до обох: як ви представите себе, правила та мету зустрічі.'},\n        {type:'slider',question:'Наскільки ви готові самостійно провести медіаційну сесію прямо зараз?',leftLabel:'Потребую ще практики і підготовки',rightLabel:'Готовий спробувати сьогодні'},\n      ],\n    },\n  ]\n\n  state = {\n    screen:'welcome',\n    diagMode:'initial',\n    diagStep:0,\n    diagAnswers:{slider1:5,slider2:5,slider3:5,choice4:null,choice5:null,voice6:''},\n    finalAnswers:{slider1:5,slider2:5,slider3:5,choice4:null,choice5:null,voice6:''},\n    initialProfile:null,\n    finalProfile:null,\n    currentLesson:1,\n    lessonTab:'theory',\n    completedLessons:[],\n    practiceAnswers:{},\n    practiceSubmitted:false,\n    reflectionAnswers:{},\n    voiceTranscript:'',\n    isRecording:false,\n    recognition:null,\n    prevScreen:'course-map',\n  }\n\n  componentDidMount() {\n    try {\n      const s = JSON.parse(localStorage.getItem('kp_med_v2')||'{}');\n      if (s.completedLessons) this.setState({ completedLessons:s.completedLessons, initialProfile:s.initialProfile||null, finalProfile:s.finalProfile||null, reflectionAnswers:s.reflectionAnswers||{} });\n    } catch(e) {}\n  }\n\n  _save() {\n    const { completedLessons, initialProfile, finalProfile, reflectionAnswers } = this.state;\n    try { localStorage.setItem('kp_med_v2', JSON.stringify({ completedLessons, initialProfile, finalProfile, reflectionAnswers })); } catch(e) {}\n  }\n\n  // ── NAV ──────────────────────────────────────────────────────────────────\n  onStart = () => this.setState({ screen:'diagnostic', diagMode:'initial', diagStep:0, voiceTranscript:'' })\n  onNextStep = () => {\n    const { diagStep, diagMode, diagAnswers,
